stages:
  data_validation:
    cmd: python -c "print('Validation handled dynamically in python API')"
    deps:
      - service/validation.py
    outs:
      - reports/validation_report.json
  drift_detection:
    cmd: python -c "print('Drift handled in python API')"
    deps:
      - service/drift.py
  train:
    cmd: python -c "print('Training handled in API')"
    deps:
      - service/train.py
    params:
      - model_type
      - learning_rate